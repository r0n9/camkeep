name: Release and Publish

# 触发条件：当推送以 'v' 开头的 tag 时（例如 v1.0.0, v2.1.3）
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  # ==========================================
  # 任务 1：编译并打包完整运行环境 (CamKeep + go2rtc) 发布到 GitHub Release
  # ==========================================
  release-binaries:
    name: Build & Package Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          # 如果未来需要支持 Windows，取消下面两行的注释即可
          # - os: windows
          #   arch: amd64
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.4'

      - name: Build and Package
        run: |
          # 提取当前触发流水的 tag (例如 v1.1.0)
          VERSION=${{ github.ref_name }}
          
          # 1. 创建打包专用的临时目录
          PACKAGE_DIR="camkeep_${{ matrix.os }}_${{ matrix.arch }}"
          mkdir -p dist/$PACKAGE_DIR
          
          # 设置变量默认值 (Linux)
          BINARY_NAME="camkeep"
          GO2RTC_DL_NAME="go2rtc_${{ matrix.os }}_${{ matrix.arch }}"
          GO2RTC_BIN_NAME="go2rtc"
          
          # 兼容 Windows 后缀
          if [ "${{ matrix.os }}" = "windows" ]; then
            BINARY_NAME="camkeep.exe"
            GO2RTC_DL_NAME="go2rtc_${{ matrix.os }}_${{ matrix.arch }}.exe"
            GO2RTC_BIN_NAME="go2rtc.exe"
          fi
          
          # 2. 编译 CamKeep 二进制
          CGO_ENABLED=0 GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -trimpath -ldflags="-s -w -X main.Version=$VERSION" -o dist/$PACKAGE_DIR/$BINARY_NAME ./main.go
          
          # 3. 下载对应架构的底层流媒体引擎 (go2rtc)
          echo "正在下载 go2rtc: $GO2RTC_DL_NAME"
          wget -qO dist/$PACKAGE_DIR/$GO2RTC_BIN_NAME https://github.com/AlexxIT/go2rtc/releases/download/v1.9.2/$GO2RTC_DL_NAME
          
          # 赋权 (非 Windows 系统)
          if [ "${{ matrix.os }}" != "windows" ]; then
            chmod +x dist/$PACKAGE_DIR/$BINARY_NAME dist/$PACKAGE_DIR/$GO2RTC_BIN_NAME
          fi
          
          # 4. 拷贝配置文件模板（避免小白用户找不到配置在哪）
          # 注意：这里假设你源码根目录下有 config/ 目录，如果没有这行也不会报错
          cp -r config dist/$PACKAGE_DIR/ 2>/dev/null || true
          
          # 5. 压缩打包
          cd dist
          if [ "${{ matrix.os }}" = "windows" ]; then
            zip -r ${PACKAGE_DIR}.zip $PACKAGE_DIR
          else
            tar -czvf ${PACKAGE_DIR}.tar.gz $PACKAGE_DIR
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          # 只上传压缩包，不上传零散的文件
          files: |
            dist/*.tar.gz
            dist/*.zip
          generate_release_notes: true

  # ==========================================
  # 任务 2：构建多架构 Docker 镜像并同时推送到 GHCR 和 Docker Hub
  # ==========================================
  docker-push:
    name: Push to GHCR and Docker Hub
    runs-on: ubuntu-latest
    needs: release-binaries # 确保二进制发布没问题后再推镜像
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU (For Multi-Arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ secrets.DOCKERHUB_USERNAME }}/camkeep
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 这里的 amd64 和 arm64 会配合你 Dockerfile 中的 TARGETARCH 动态下载环境
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 将 tag 作为 VERSION 变量传递给 Dockerfile
          build-args: |
            VERSION=${{ github.ref_name }}