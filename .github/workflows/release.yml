name: Release and Publish

# 触发条件：当推送以 'v' 开头的 tag 时（例如 v1.0.0, v2.1.3）
on:
  push:
    tags:
      - 'v*'

# 配置权限，允许 Action 创建 Release 和推送镜像到 GHCR
permissions:
  contents: write
  packages: write # 新增：允许推送到 GitHub Container Registry

jobs:
  # ==========================================
  # 任务 1：交叉编译二进制文件并发布到 GitHub Release
  # ==========================================
  release-binaries:
    name: Build & Release Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 定义需要编译的目标平台和架构
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.4' # 与你的 go.mod 保持一致

      - name: Build Binary
        run: |
          mkdir -p dist
          BINARY_NAME=camkeep_${{ matrix.os }}_${{ matrix.arch }}
          # 如果是 Windows，自动加上 .exe 后缀
          if [ "${{ matrix.os }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          # 执行编译 (禁用 CGO 以保证跨平台兼容性)
          CGO_ENABLED=0 GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -trimpath -ldflags="-s -w" -o dist/$BINARY_NAME ./main.go

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true # 自动根据 commit 生成更新日志

  # ==========================================
  # 任务 2：构建多架构 Docker 镜像并同时推送到 GHCR 和 Docker Hub
  # ==========================================
  docker-push:
    name: Push to GHCR and Docker Hub
    runs-on: ubuntu-latest
    needs: release-binaries # 等二进制发布成功后再推送镜像
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU (For Multi-Arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 新增：登录到 GitHub Container Registry (GHCR)
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # 使用 GitHub 默认提供的 token

      # 保持原有的 Docker Hub 登录
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 修改：为两个镜像库同时生成 Metadata (标签和标签信息)
      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ secrets.DOCKERHUB_USERNAME }}/camkeep
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      # 执行一次构建，自动将结果 push 到 Metadata 中定义的所有仓库（GHCR 和 Docker Hub）
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 自动构建 amd64 和 arm64 架构，适配普通 NAS 和 树莓派/Mac M系列等
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}