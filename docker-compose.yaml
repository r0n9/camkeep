services:
  camkeep:
    image: r0n9/camkeep:latest
    container_name: camkeep
    restart: unless-stopped
    network_mode: "host" # 建议使用 host 网络，否则WebRTC可能握手失败
    environment:
      - TZ=Asia/Shanghai
      - CAMKEEP_AUTH_USER=admin
      - CAMKEEP_AUTH_PASSWORD=admin
      - CAMKEEP_SESSION_SECRET=B1JM12wvPLHL9bturc2DfiFFvHjtntl2+OG+V/2yXjg=
    volumes:
      - ./config:/app/config
      - ./records:/app/records
#    ports:
#      - "9110:9110"      # CamKeep Web 控制台
#      - "1984:1984"      # go2rtc API 端口
#      - "8554:8554"      # RTSP 服务端口
#      - "8555:8555/tcp"  # WebRTC 端口 (必须暴露，否则无画面)
#      - "8555:8555/udp"
