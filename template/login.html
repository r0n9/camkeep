<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 CamKeep</title>
    <script>
        window.tailwind = window.tailwind || {};
        window.tailwind.config = {darkMode: 'class'};
        (function () {
            try {
                var savedTheme = localStorage.getItem('camkeep-theme');
                var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                    document.documentElement.classList.add('dark');
                }
            } catch (e) {
            }
        })();
    </script>
    <script src="/static/js/tailwindcss.min.js"></script>
    <link rel="icon" href="/static/image/camkeep_w200.png">
    <link rel="stylesheet" href="/static/css/index.css">
    <link rel="stylesheet" href="/static/css/neumorphism.css">
</head>
<body class="min-h-screen bg-slate-100 p-4 transition-colors duration-200">
<main class="mx-auto flex min-h-[calc(100vh-2rem)] w-full max-w-md items-center justify-center">
    <section class="nm-login-card w-full rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
        <div class="mb-6 flex items-center gap-3">
            <img src="/static/image/camkeep_w80.png" alt="CamKeep" class="h-10 w-10 object-contain">
            <div>
                <h1 class="text-lg font-extrabold tracking-tight text-slate-900">CamKeep NVR</h1>
                <p class="mt-0.5 text-xs font-medium text-slate-500">{{ .Version }}</p>
            </div>
        </div>

        {{ if .Error }}
        <div class="mb-4 rounded-lg border border-red-100 bg-red-50 px-3 py-2 text-sm font-bold text-red-600">
            {{ .Error }}
        </div>
        {{ end }}

        <form method="post" action="/login" class="space-y-4">
            <input type="hidden" name="next" value="{{ .Next }}">
            <label class="block">
                <span class="mb-1 block text-xs font-extrabold text-slate-500">用户名</span>
                <input name="username" value="{{ .User }}" autocomplete="username" autofocus class="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-medium text-slate-800 outline-none transition-all focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10">
            </label>
            <label class="block">
                <span class="mb-1 block text-xs font-extrabold text-slate-500">密码</span>
                <input name="password" type="password" autocomplete="current-password" class="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-medium text-slate-800 outline-none transition-all focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10">
            </label>
            <button type="submit" class="nm-btn--accent flex h-10 w-full items-center justify-center rounded-lg bg-blue-600 px-4 text-sm font-extrabold text-white shadow-[0_4px_12px_rgba(37,99,235,0.25)] transition-all hover:bg-blue-700 active:scale-[0.99]">
                登录
            </button>
        </form>
    </section>
</main>
</body>
</html>
