<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>CamKeep 控制中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/DPlayer.min.css">
    <script src="/static/mpegts.min.js"></script>
    <script src="/static/DPlayer.min.js"></script>
    <link rel="icon" href="/static/camkeep_w200.png">
</head>
<body class="bg-gray-100 p-4 md:p-8 min-h-screen">
<div class="max-w-[1400px] mx-auto">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-3xl font-bold text-gray-800 flex items-center">
            <span class="w-2 h-8 bg-blue-600 mr-3 rounded-full shadow-sm"></span>

            CamKeep 监控中心

            <div class="ml-4 flex items-center space-x-3">
                <span class="inline-flex items-center rounded-full bg-blue-50 px-3 py-1 text-sm font-medium text-blue-700 ring-1 ring-inset ring-blue-700/10 shadow-sm font-mono">
                    <svg class="w-3.5 h-3.5 mr-1.5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path>
                    </svg>
                    {{ .Version }}
                </span>

                <a href="https://github.com/r0n9/camkeep"
                   target="_blank"
                   class="text-gray-400 hover:text-gray-600 transition-colors flex items-center"
                   title="查看 GitHub 源码">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                        <path fill-rule="evenodd"
                              d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"
                              clip-rule="evenodd"></path>
                    </svg>
                </a>
            </div>
        </h1>
        <div class="flex items-center space-x-4">
            <button onclick="openConfig()"
                    class="group flex items-center space-x-2 bg-white hover:bg-gray-50 text-gray-700 px-4 py-2 rounded-xl text-sm font-bold border border-gray-200 shadow-sm transition-all hover:shadow-md hover:-translate-y-0.5 active:scale-95">
                <svg class="w-4 h-4 text-gray-500 group-hover:rotate-90 transition-transform duration-500" fill="none"
                     stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                <span>配置管理</span>
            </button>

            <div class="flex items-center px-4 py-2 bg-emerald-50 border border-emerald-100 rounded-xl shadow-inner">
        <span class="relative flex h-2.5 w-2.5 mr-3">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
        </span>
                <span class="text-xs font-bold text-emerald-700 tracking-widest uppercase">系统在线</span>
            </div>
        </div>
    </div>

    <div id="configModal"
         class="hidden fixed inset-0 bg-slate-900/40 z-50 flex items-center justify-center backdrop-blur-md transition-opacity duration-300">

        <div class="bg-white rounded-2xl w-[80%] max-w-[95%] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.1)] border border-white/50 transform transition-all flex flex-col overflow-hidden my-6 max-h-[90vh]">

            <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-start bg-slate-50/50">
                <div>
                    <h2 class="text-lg font-extrabold text-slate-800 tracking-tight flex items-center">
                        <svg class="w-5 h-5 mr-2 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        系统配置
                    </h2>
                    <p class="text-xs text-slate-500 mt-1.5 font-medium">修改保存后，系统将会自动热重启录像任务并应用新配置。</p>
                </div>

                <button onclick="closeConfig()" class="p-1.5 text-slate-400 hover:text-slate-700 hover:bg-slate-200/50 rounded-full transition-colors focus:outline-none">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div class="p-6 overflow-y-auto custom-scrollbar">
                <div class="mb-5 relative overflow-hidden rounded-xl bg-gradient-to-br from-slate-50 to-white border border-slate-200 shadow-sm transition-all duration-300 hover:shadow-md">
                    <div class="absolute top-0 left-0 w-1 h-full bg-blue-500 rounded-l-xl"></div>
                    <div class="p-4 sm:p-5 flex flex-col sm:flex-row justify-between gap-4 pl-5 sm:pl-6">
                        <div class="flex items-start">
                            <div class="flex-shrink-0 w-8 h-8 rounded-full bg-blue-50 border border-blue-100 flex items-center justify-center mr-3.5 text-blue-600 shadow-sm mt-0.5">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                                </svg>
                            </div>
                            <div>
                                <h3 class="text-sm font-bold text-slate-800 tracking-tight">发现未接入设备</h3>
                                <p class="text-xs text-slate-500 mt-1 leading-relaxed">
                                    点击“扫描设备”，快速检索并添加底层未接入的摄像头源。
                                </p>
                            </div>
                        </div>

                        <div class="flex items-center space-x-3 shrink-0">
                            <button onclick="window.open(window.location.protocol + '//' + window.location.hostname + ':1984/add.html', '_blank')"
                                    class="group flex items-center px-4 py-2 bg-white border border-slate-200 text-slate-600 hover:text-blue-600 hover:border-blue-300 hover:bg-blue-50 text-xs font-semibold rounded-lg shadow-sm transition-all duration-200 active:scale-95"
                                    title="在新窗口打开 go2rtc 控制台">
                                <svg class="w-3.5 h-3.5 mr-1.5 text-slate-400 group-hover:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                                </svg>
                                去 go2rtc 添加
                            </button>
                            <button onclick="scanUnmanagedStreams()"
                                    class="flex items-center px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold rounded-lg shadow-[0_2px_10px_-3px_rgba(37,99,235,0.4)] hover:shadow-[0_4px_14px_-4px_rgba(37,99,235,0.6)] transition-all duration-200 active:scale-95">
                                扫描设备
                            </button>
                        </div>
                    </div>
                    <div id="unmanagedList" class="hidden px-5 pb-4 pt-1 border-t border-slate-100 flex-wrap gap-2"></div>
                </div>

                <div class="group relative flex flex-col rounded-xl overflow-hidden border border-slate-200 shadow-sm focus-within:border-blue-500 focus-within:ring-4 focus-within:ring-blue-500/10 transition-all duration-300 bg-slate-50/50">
                    <div class="flex items-center justify-between px-4 py-2 border-b border-slate-200 bg-white/60">
                        <div class="flex items-center space-x-2">
                            <div class="flex space-x-1.5 mr-3">
                                <div class="w-2.5 h-2.5 rounded-full bg-slate-300 group-hover:bg-red-400 transition-colors"></div>
                                <div class="w-2.5 h-2.5 rounded-full bg-slate-300 group-hover:bg-amber-400 transition-colors"></div>
                                <div class="w-2.5 h-2.5 rounded-full bg-slate-300 group-hover:bg-emerald-400 transition-colors"></div>
                            </div>
                            <span class="text-[11px] font-mono text-slate-500 font-bold tracking-wider">conf.yaml</span>
                        </div>
                        <span class="text-[10px] text-slate-400 font-medium">YAML</span>
                    </div>
                    <textarea id="configYaml"
                              class="w-full h-[350px] p-4 font-mono text-[13px] leading-relaxed text-slate-700 bg-transparent outline-none resize-none custom-scrollbar"
                              spellcheck="false"></textarea>
                </div>
            </div>

            <div class="px-6 py-4 border-t border-slate-100 bg-slate-50/50 flex justify-end space-x-3 shrink-0">
                <button onclick="closeConfig()"
                        class="px-5 py-2.5 bg-white border border-slate-200 text-slate-700 rounded-lg text-sm font-bold hover:bg-slate-50 hover:text-slate-900 shadow-sm transition-all active:scale-95">
                    取消
                </button>
                <button onclick="saveConfig()"
                        class="px-5 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-bold shadow-[0_4px_12px_rgba(37,99,235,0.3)] hover:shadow-[0_6px_16px_rgba(37,99,235,0.4)] hover:-translate-y-0.5 transition-all active:scale-95 flex items-center">
                    <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                    保存并应用
                </button>
            </div>

        </div>
    </div>

    <div id="confirmModal"
         class="hidden fixed inset-0 bg-black/60 z-[60] flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white p-6 rounded-2xl w-[420px] max-w-[95%] shadow-2xl transform transition-all">
            <div class="flex items-center mb-3">
                <div id="confirmIcon" class="w-10 h-10 rounded-full flex items-center justify-center mr-3 text-white">
                </div>
                <h2 class="text-xl font-bold text-gray-800" id="confirmTitle">操作确认</h2>
            </div>
            <div class="text-sm text-gray-600 mb-6 pl-13" id="confirmDesc">描述信息</div>
            <div class="flex justify-end space-x-3">
                <button onclick="closeConfirm()"
                        class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 font-bold transition-all">
                    取消
                </button>
                <button id="confirmBtn" onclick="executeConfirmAction()"
                        class="px-4 py-2 text-white rounded-lg font-bold shadow transition-all">确认执行
                </button>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-8">
        <div class="lg:col-span-1 bg-white p-4 rounded-xl shadow-sm border-t-4 border-blue-500 flex flex-col h-[500px]">
            <h2 class="font-bold mb-4 text-lg text-gray-700 flex items-center">实时节点</h2>
            <div id="camList" class="space-y-2 overflow-y-auto flex-1 pr-1 custom-scrollbar">
                <div class="text-sm text-gray-400 text-center py-10">正在同步设备状态...</div>
            </div>
        </div>
        <div class="lg:col-span-3 bg-black rounded-xl shadow-xl overflow-hidden relative h-[500px] flex flex-col justify-center border border-gray-800">
            <iframe id="live-iframe" class="w-full h-full bg-black hidden border-0"
                    allow="autoplay; fullscreen; microphone; camera"></iframe>
            <div id="dplayer" class="w-full h-full"></div>
            <video id="native-player" class="w-full h-full object-contain bg-black hidden" playsinline controls></video>
            <div class="absolute top-4 left-4 z-10 bg-black/10 text-white px-4 py-2 text-sm rounded-lg shadow-xs backdrop-blur-xs border border-white/10 transition-all hover:bg-black/30">
                当前焦点: <span id="currentCam" class="text-blue-400 font-bold ml-1">未选择</span>
            </div>
        </div>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm border-t-4 border-emerald-500">
        <div class="flex items-center justify-between mb-6">
            <h2 class="font-bold text-lg text-gray-700">历史录像档案</h2>
            <span id="recordCount"
                  class="text-xs font-medium text-gray-500 bg-gray-100 px-3 py-1 rounded-full border border-gray-200">0 个文件</span>
        </div>
        <div id="recordList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </div>
</div>

<style>
    .custom-scrollbar::-webkit-scrollbar {
        width: 5px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #cbd5e1;
    }

    .dplayer-video-wrap {
        background-color: #000 !important;
    }
</style>

<script>
    let dp = null;
    let pc = null;
    let currentSelectedCam = null;

    window.onload = function () {
        if (typeof DPlayer === 'undefined') {
            alert("播放器组件加载失败，请检查网络！");
            return;
        }
        loadStatus();
        setInterval(loadStatus, 5000);
    };

    let pendingAction = null;

    // 打开确认弹窗并动态渲染文案
    function confirmCamAction(camId, action) {
        pendingAction = {camId, action};
        const titleEl = document.getElementById('confirmTitle');
        const descEl = document.getElementById('confirmDesc');
        const btnEl = document.getElementById('confirmBtn');
        const iconEl = document.getElementById('confirmIcon');

        if (action === 'start') {
            titleEl.innerText = `强制开启录像 (${camId})`;
            descEl.innerHTML = `
                <p class="mb-2">此操作将<b>无视配置中的时间表</b>，立刻开始录像。</p>
                <p class="mb-2">摄像头将<b>一直保持录制状态</b>，直到您手动点击“停录”或恢复“计划”。</p>
                <p class="text-xs text-green-600 font-bold mt-3 border-t pt-2">⚡ 确认后稍后即生效</p>
            `;
            btnEl.className = "px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg font-bold shadow transition-all";
            btnEl.innerText = "确认强录";
            iconEl.className = "w-10 h-10 rounded-full flex items-center justify-center mr-3 text-white bg-green-500 shadow-lg shadow-green-200";
            iconEl.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>`;
        } else if (action === 'stop') {
            titleEl.innerText = `强制停止录像 (${camId})`;
            descEl.innerHTML = `
                <p class="mb-2">此操作将<b>立即中断当前的录像任务</b>。</p>
                <p class="mb-2">摄像头将<b>一直保持不录像状态</b>（即使在计划时间内也不会录），直到您手动点击“强制录”或恢复“计划”。</p>
                <p class="text-xs text-red-500 font-bold mt-3 border-t pt-2">⚡ 确认后稍后即生效</p>
            `;
            btnEl.className = "px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-bold shadow transition-all";
            btnEl.innerText = "确认停录";
            iconEl.className = "w-10 h-10 rounded-full flex items-center justify-center mr-3 text-white bg-red-500 shadow-lg shadow-red-200";
            iconEl.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path></svg>`;
        } else if (action === 'auto') {
            titleEl.innerText = `恢复自动计划 (${camId})`;
            descEl.innerHTML = `
                <p class="mb-2">解除强制状态，将摄像头的录像控制权交还给系统。</p>
                <p class="mb-2">系统将严格按照 conf.yaml 中的 <code>record_time</code> 时间表自动启停录像。</p>
                <p class="text-xs text-blue-500 font-bold mt-3 border-t pt-2">⚡ 确认后立即应用计划逻辑</p>
            `;
            btnEl.className = "px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold shadow transition-all";
            btnEl.innerText = "恢复计划";
            iconEl.className = "w-10 h-10 rounded-full flex items-center justify-center mr-3 text-white bg-blue-500 shadow-lg shadow-blue-200";
            iconEl.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>`;
        }

        document.getElementById('confirmModal').classList.remove('hidden');
    }

    function closeConfirm() {
        document.getElementById('confirmModal').classList.add('hidden');
        pendingAction = null;
    }

    async function executeConfirmAction() {
        if (!pendingAction) return;
        const {camId, action} = pendingAction;

        // 按钮进入 loading 状态 (可选优化)
        const btn = document.getElementById('confirmBtn');
        const originText = btn.innerText;
        btn.innerText = "执行中...";
        btn.disabled = true;

        await fetch(`/api/camera/${camId}/${action}`, {method: 'POST'});

        btn.innerText = originText;
        btn.disabled = false;
        closeConfirm();
        loadStatus();
    }

    // 配置弹窗逻辑
    async function openConfig() {
        const resp = await fetch('/api/config');
        document.getElementById('configYaml').value = await resp.text();
        document.getElementById('configModal').classList.remove('hidden');
    }

    function closeConfig() {
        document.getElementById('configModal').classList.add('hidden');
    }

    async function saveConfig() {
        const yamlText = document.getElementById('configYaml').value;
        const resp = await fetch('/api/config', {method: 'POST', body: yamlText});
        if (resp.ok) {
            alert('配置已生效并自动重启任务！');
            closeConfig();
            loadStatus();
        } else {
            const err = await resp.json();
            alert('保存失败: ' + err.error);
        }
    }

    async function loadStatus() {
        try {
            const resp = await fetch('/api/status');
            const data = await resp.json();
            const list = document.getElementById('camList');
            list.innerHTML = '';

            Object.entries(data).forEach(([id, cam]) => {
                const isRunning = cam.is_running;
                const isSelected = currentSelectedCam === id;
                const streamState = cam.stream_state || 'offline';
                let streamLight, streamText;
                if (streamState === 'online') {
                    streamLight = 'bg-green-500 shadow-[0_0_5px_#22c55e]';
                    streamText = '<span class="text-[10px] text-green-600 font-bold">流在线</span>';
                } else if (streamState === 'idle') {
                    streamLight = 'bg-blue-400 shadow-[0_0_5px_#60a5fa]';
                    streamText = '<span class="text-[10px] text-blue-500 font-bold">就绪待机</span>';
                } else {
                    streamLight = 'bg-red-500 shadow-[0_0_5px_#ef4444]';
                    streamText = '<span class="text-[10px] text-red-500 font-bold">流断线</span>';
                }

                const item = document.createElement('div');
                item.className = `p-3 rounded-xl border cursor-pointer transition-all flex flex-col group
                    ${isSelected ? 'bg-blue-50 border-blue-400 ring-2 ring-blue-100' : 'bg-white border-gray-200 hover:border-blue-300 hover:shadow-sm'}
                    ${isRunning ? '' : 'opacity-80'}`;

                item.onclick = () => selectCamera(id);

                item.innerHTML = `
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center">
                            <div class="flex flex-col mr-3 space-y-1.5 border-r border-gray-100 pr-3 min-w-[65px]">
                                <div class="flex items-center" title="摄像机实时流状态">
                                    <div class="w-2 h-2 rounded-full ${streamLight} mr-1.5 shrink-0"></div>
                                    ${streamText}
                                </div>
                                <div class="flex items-center" title="本地录制状态">
                                    <div class="w-2 h-2 rounded-full ${isRunning ? 'bg-red-500 shadow-[0_0_5px_#ef4444] animate-pulse' : 'bg-gray-300'} mr-1.5 shrink-0"></div>
                                    <span class="text-[10px] ${isRunning ? 'text-gray-700' : 'text-gray-400'} font-bold">${isRunning ? '录制中' : '未录像'}</span>
                                </div>
                            </div>

                            <div class="flex flex-col">
                                <span class="font-bold text-gray-800 text-sm tracking-tight">${id}</span>
                                <span class="text-[10px] text-gray-400 uppercase">${cam.mode || 'Normal'}</span>
                            </div>
                        </div>
                        <button onclick="event.stopPropagation(); previewLive('${id}')"
                                class="w-8 h-8 flex items-center justify-center rounded bg-blue-600 hover:bg-blue-700 text-white shadow transition-colors"
                                title="主动拉流直播">▶</button>
                    </div>

                    <div class="flex justify-between items-center border-t border-gray-100 pt-2.5 mt-2">
                        <span class="text-[10px] font-bold text-gray-400">录制控制</span>
                        <div class="flex space-x-1.5">
                            <button onclick="event.stopPropagation(); confirmCamAction('${id}', 'start')"
                                    class="group/btn flex items-center px-2 py-1 text-[11px] font-bold bg-emerald-50 text-emerald-600 border border-emerald-200 rounded-md hover:bg-emerald-500 hover:text-white hover:border-emerald-500 shadow-sm transition-all duration-200 active:scale-95">
                                <svg class="w-3 h-3 mr-1 text-emerald-500 group-hover/btn:text-white transition-colors" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"></circle></svg>
                                强录
                            </button>

                            <button onclick="event.stopPropagation(); confirmCamAction('${id}', 'stop')"
                                    class="group/btn flex items-center px-2 py-1 text-[11px] font-bold bg-rose-50 text-rose-600 border border-rose-200 rounded-md hover:bg-rose-500 hover:text-white hover:border-rose-500 shadow-sm transition-all duration-200 active:scale-95">
                                <svg class="w-3 h-3 mr-1 text-rose-500 group-hover/btn:text-white transition-colors" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"></rect></svg>
                                停录
                            </button>

                            <button onclick="event.stopPropagation(); confirmCamAction('${id}', 'auto')"
                                    class="group/btn flex items-center px-2 py-1 text-[11px] font-bold bg-indigo-50 text-indigo-600 border border-indigo-200 rounded-md hover:bg-indigo-500 hover:text-white hover:border-indigo-500 shadow-sm transition-all duration-200 active:scale-95">
                                <svg class="w-3 h-3 mr-1 text-indigo-500 group-hover/btn:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                计划
                            </button>
                        </div>
                    </div>
                `;
                list.appendChild(item);
            });
        } catch (e) {
            console.error("同步状态失败:", e);
        }
    }

    // 后续的播放代码逻辑与原版基本一致，此处折叠保留
    function selectCamera(camId) {
        currentSelectedCam = camId;
        document.getElementById('currentCam').innerText = `[已选择] ${camId}`;
        loadStatus();
        loadRecords(camId);
    }

    function previewLive(camId) {
        currentSelectedCam = camId;
        document.getElementById('currentCam').innerText = `[直播中] ${camId}`;
        loadStatus();
        playVideo(camId, true);
        loadRecords(camId);
    }

    function playVideo(source, isLive) {
        const liveIframe = document.getElementById('live-iframe');
        const dplayerContainer = document.getElementById('dplayer');
        const nativePlayer = document.getElementById('native-player');

        // 销毁回放器实例
        if (dp) {
            dp.destroy();
            dp = null;
        }

        // 【清理遗留】清理原版 JS 中的 pc 变量（如果你把 let pc = null 保留在了顶部）
        if (typeof pc !== 'undefined' && pc) {
            pc.close();
            pc = null;
        }

        if (isLive) {
            dplayerContainer.classList.add('hidden');
            nativePlayer.classList.add('hidden');
            liveIframe.classList.remove('hidden');

            // 直接加载代理过来的 go2rtc 原生流媒体协商页面
            // 它会自动根据 PC/iOS/Android 情况，在 WebRTC/MSE/MP4/HLS 中自适应降级播放
            liveIframe.src = `/stream.html?src=${source}`;

        } else {
            liveIframe.classList.add('hidden');
            liveIframe.src = ''; // 清空 src 阻断底层直播数据流拉取，节约性能

            // 判断是否是苹果生态设备 (iOS/Mac Safari)
            const isApple = /Mac|iPod|iPhone|iPad/.test(navigator.platform) ||
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1) ||
                /Safari/i.test(navigator.userAgent) && !/Chrome/i.test(navigator.userAgent);

            if (isApple) {
                // 苹果设备：直接弃用 DPlayer，使用原生 Video 组件
                dplayerContainer.classList.add('hidden');
                nativePlayer.classList.remove('hidden');

                let playUrl = source;
                if (source.endsWith('.ts')) {
                    // 黑科技：将请求路由替换为我们刚写的伪装接口，触发 iOS 原生硬件解码
                    playUrl = source.replace('/play/', '/play_hls/');
                }

                nativePlayer.src = playUrl;
                nativePlayer.play().catch(e => console.log("等待用户点击播放"));
            } else {
                // 💻 PC及安卓设备：继续使用 DPlayer + mpegts.js
                nativePlayer.classList.add('hidden');
                dplayerContainer.classList.remove('hidden');
                let videoType = source.endsWith('.ts') ? 'customTs' : 'normal';
                dp = new DPlayer({
                    container: dplayerContainer,
                    video: {
                        url: source,
                        type: videoType,
                        customType: {
                            customTs: function (video, player) {
                                const tsPlayer = mpegts.createPlayer({type: 'm2ts', isLive: false, url: video.src});
                                tsPlayer.attachMediaElement(video);
                                tsPlayer.load();
                                tsPlayer.play();
                                player.events.on('destroy', () => {
                                    tsPlayer.destroy();
                                });
                            }
                        }
                    }
                });
            }
        }
    }

    async function loadRecords(camId) {
        const list = document.getElementById('recordList');
        const countBadge = document.getElementById('recordCount');
        list.innerHTML = '<div class="col-span-full text-center py-10 text-gray-400">检索中...</div>';

        try {
            const resp = await fetch(`/api/records/${camId}`);
            const files = await resp.json();
            list.innerHTML = '';

            if (!files || files.length === 0) {
                countBadge.innerText = '0 个文件';
                list.innerHTML = '<div class="col-span-full text-center py-12 text-gray-400">该设备暂无历史录像</div>';
                return;
            }

            countBadge.innerText = `${files.length} 个文件`;
            const groups = {};
            files.forEach(file => {
                const match = file.name.match(/\d{4}-\d{2}-\d{2}/);
                const dateStr = match ? match[0] : '其他归档';
                if (!groups[dateStr]) groups[dateStr] = [];
                groups[dateStr].push(file);
            });

            const sortedDates = Object.keys(groups).sort((a, b) => b.localeCompare(a));
            sortedDates.forEach((date, index) => {
                const dateFiles = groups[date];
                dateFiles.sort((a, b) => b.name.localeCompare(a.name));
                const groupId = `date-${index}`;
                const isFirst = index === 0;
                const groupDiv = document.createElement('div');
                groupDiv.className = 'flex flex-col bg-gray-50 border border-gray-200 rounded-xl overflow-hidden shadow-sm';

                const header = document.createElement('div');
                header.className = 'flex justify-between items-center p-3.5 bg-white border-b border-gray-200 cursor-pointer hover:bg-blue-50 transition-colors select-none';
                header.onclick = () => {
                    document.getElementById(`content-${groupId}`).classList.toggle('hidden');
                    document.getElementById(`icon-${groupId}`).classList.toggle('rotate-90');
                };
                header.innerHTML = `
                    <div class="flex items-center">
                        <span class="text-sm font-bold text-gray-700">${date}</span>
                        <span class="ml-2 text-[10px] font-bold bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full">${dateFiles.length}</span>
                    </div>
                    <svg id="icon-${groupId}" class="w-4 h-4 text-gray-400 transition-transform ${isFirst ? 'rotate-90' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                `;

                const content = document.createElement('div');
                content.id = `content-${groupId}`;
                content.className = `flex flex-col space-y-1 p-2 max-h-[300px] overflow-y-auto custom-scrollbar ${isFirst ? '' : 'hidden'}`;

                dateFiles.forEach(file => {
                    const timeMatch = file.name.match(/\d{2}-\d{2}-\d{2}\.(ts|mp4)$/);
                    let timeDisplay = timeMatch ? timeMatch[0].replace(/\.(ts|mp4)$/, '').replace(/-/g, ':') : file.name;
                    const ext = file.name.split('.').pop().toUpperCase();
                    const item = document.createElement('div');
                    item.className = 'flex justify-between items-center p-2.5 text-xs rounded-lg bg-white border border-gray-100 hover:border-blue-400 hover:text-blue-600 cursor-pointer transition-all shadow-sm group';
                    item.onclick = () => {
                        document.getElementById('currentCam').innerText = `[回放] ${camId} (${timeDisplay})`;
                        playVideo(file.url, false);
                    };
                    item.innerHTML = `
                    <div class="flex items-center">
                        <span class="mr-2">🎬</span>
                        <span class="font-mono font-bold">${timeDisplay}</span>
                    </div>
                    <div class="flex items-center space-x-2">
                        <span class="text-[10px] text-gray-400 font-mono">${file.size}</span>
                        <span class="text-[9px] px-1 bg-gray-50 text-gray-400 rounded border border-gray-100 font-bold">${ext}</span>
                        <button onclick="deleteRecord(event, '${camId}', '${file.path}')" class="text-red-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition-opacity px-1" title="永久删除该录像">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                `;
                    content.appendChild(item);
                });
                groupDiv.appendChild(header);
                groupDiv.appendChild(content);
                list.appendChild(groupDiv);
            });
        } catch (e) {
            list.innerHTML = '<div class="col-span-full text-center py-10 text-red-400">获取录像列表失败</div>';
        }
    }

    // 录像删除操作控制
    async function deleteRecord(e, camId, filePath) {
        // 阻止事件冒泡，防止点击删除按钮时触发整个条目的“播放”动作
        e.stopPropagation();

        if (!confirm('确定要永久删除此录像文件吗？释放的空间不可恢复。')) return;

        try {
            const resp = await fetch(`/api/record?path=${encodeURIComponent(filePath)}`, {method: 'DELETE'});
            if (resp.ok) {
                // 删除成功后，静默刷新当前摄像头的录像列表
                loadRecords(camId);
            } else {
                const err = await resp.json();
                alert('操作失败: ' + err.error);
            }
        } catch (err) {
            alert('网络请求失败，请检查 NAS 连接状态');
        }
    }

    // 扫描未管理的设备
    async function scanUnmanagedStreams() {
        const listDiv = document.getElementById('unmanagedList');
        listDiv.innerHTML = '<span class="text-xs text-gray-500">正在与 go2rtc 通信并检索流...</span>';
        listDiv.classList.remove('hidden');

        try {
            const resp = await fetch('/api/go2rtc/unmanaged');
            if (!resp.ok) {
                const err = await resp.json();
                throw new Error(err.error || '请求失败');
            }
            const streams = await resp.json();

            if (!streams || streams.length === 0) {
                listDiv.innerHTML = '<span class="text-xs text-emerald-600 font-bold">🎉 所有 go2rtc 流均已接入系统，暂无新发现。</span>';
                return;
            }

            listDiv.innerHTML = '';
            streams.forEach(stream => {
                const tag = document.createElement('div');
                tag.id = `unmanaged-${stream}`;
                tag.className = 'flex items-center bg-white border border-blue-200 pl-3 pr-1 py-1 rounded-md shadow-sm';
                tag.innerHTML = `
                    <span class="text-xs font-mono font-bold text-gray-700 mr-3">${stream}</span>
                    <button onclick="appendStreamToConfig('${stream}')" class="text-[10px] bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white px-2 py-1 rounded transition-colors font-bold">
                        ➕ 追加到配置
                    </button>
                `;
                listDiv.appendChild(tag);
            });

        } catch (e) {
            listDiv.innerHTML = `<span class="text-xs text-red-500 font-bold">扫描失败: ${e.message}</span>`;
        }
    }

    // 将设备追加到下方 YAML 编辑器中
    function appendStreamToConfig(streamId) {
        const textArea = document.getElementById('configYaml');
        let content = textArea.value;

        // 【智能探测】：正则寻找已有的列表缩进格式 (例如寻找 "    - ")
        let listIndent = "  ";   // 默认兜底：2个空格
        let propIndent = "    "; // 默认兜底：属性比列表符多2个空格

        const indentMatch = content.match(/^(\s+)-\s/m);
        if (indentMatch) {
            listIndent = indentMatch[1];       // 提取已有的缩进空格数 (如 4 个空格)
            propIndent = listIndent + "  ";    // 属性行在此基础上加 2 个空格
        }

        // 使用动态探测到的缩进级别来拼接 YAML
        const newCamYaml = [
            `${listIndent}- id: "${streamId}"`,
            `${propIndent}rtsp_url: "managed_by_go2rtc"`,
            `${propIndent}auto_discovered: true`,
            `${propIndent}retention_days: 7`,
            `${propIndent}segment_duration: 600`,
            `${propIndent}format: ts`,
            `${propIndent}min_size_kb: 1024`,
            `${propIndent}record_time: "00:00-23:59"`,
            `${propIndent}mode: normal`
        ].join('\n') + '\n';

        // 稳健的换行与头部检测
        if (content.trim() === '') {
            content = 'cameras:\n';
        } else {
            if (!content.endsWith('\n')) {
                content += '\n';
            }
            if (!content.includes('cameras:')) {
                content += 'cameras:\n';
            }
        }

        textArea.value = content + newCamYaml;

        // UI 交互反馈：移除已被选中的设备标签
        const tag = document.getElementById(`unmanaged-${streamId}`);
        if (tag) tag.remove();

        // 如果全部添加完毕，给个成功提示
        const listDiv = document.getElementById('unmanagedList');
        if (listDiv.children.length === 0) {
            listDiv.innerHTML = '<span class="text-xs text-emerald-600 font-bold">🎉 所有发现设备已追加到下方配置框，请检查后点击【保存并应用】。</span>';
        }

        // 让编辑框闪烁一下，提醒用户内容已被更改
        textArea.classList.add('ring-2', 'ring-emerald-400', 'transition-all', 'duration-300');
        setTimeout(() => textArea.classList.remove('ring-2', 'ring-emerald-400'), 800);
    }
</script>
